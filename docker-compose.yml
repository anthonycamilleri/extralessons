services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: extralessons
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d extralessons"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD:-app}@db:5432/extralessons
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi --workers 3 --bind 0.0.0.0:8000"

  notifier:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD:-app}@db:5432/extralessons
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py run_notifier

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-http://localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - media:/srv/media:ro
      - caddy_data:/data
    depends_on:
      - web

volumes:
  pgdata:
  media:
  caddy_data:
