{% extends "base.html" %}
{% block title %}Reset password{% endblock %}
{% block content %}
<div class="auth-box panel">
  <h1>Reset your password</h1>
  <p class="muted small">Enter your email address and we'll send you a reset link.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Send reset link</button>
  </form>
</div>
{% endblock %}
