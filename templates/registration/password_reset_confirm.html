{% extends "base.html" %}
{% block title %}Choose a new password{% endblock %}
{% block content %}
<div class="auth-box panel">
  <h1>Choose a new password</h1>
  {% if validlink %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn">Set new password</button>
    </form>
  {% else %}
    <p>This reset link is invalid or has expired.
       <a href="{% url 'password_reset' %}">Request a new one</a>.</p>
  {% endif %}
</div>
{% endblock %}
